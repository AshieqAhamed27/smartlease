services:
  # ── Backend API ───────────────────────────────────────────────
  - type: web
    name: smartlease-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    region: singapore
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: smartlease-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: smartlease-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_PRO_PLAN_ID
        sync: false
      - key: RAZORPAY_BUSINESS_PLAN_ID
        sync: false
      - key: PAYMENT_SIMULATION
        value: "false"
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_REGION
        value: auto
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false
      - key: STORAGE_PUBLIC_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: SmartLease <hello@smartlease.in>
      - key: APP_URL
        sync: false
      - key: API_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
    buildFilter:
      paths:
        - backend/**

  # ── Background Worker ─────────────────────────────────────────
  - type: worker
    name: smartlease-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    region: singapore
    startCommand: node dist/worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: smartlease-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: smartlease-redis
          type: redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false

databases:
  - name: smartlease-db
    plan: starter
    region: singapore
    databaseName: smartlease
    user: smartlease

  - name: smartlease-redis
    plan: starter
    region: singapore
